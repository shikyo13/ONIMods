title: "Duplicant Status Bar"
description: "[h1]Duplicant Status Bar[/h1]\n\nA persistent bar at the top of your screen showing every duplicant on the current asteroid with the ability to click to focus. Think RimWorld's colonist bar, but for ONI. Does not break steam achievements.\n\nVanilla gives you a global stress number in the corner and that's about it. No persistent per-dupe status, no way to spot a suffocating dupe or an imminent breakdown without clicking through menus or hunting someone down on the map. By the time you notice, they're already destroying your oxygen diffusers. This mod fixes that.\n\nEach dupe gets a widget with a stress-colored border that shifts through a 5-tier gradient: green at calm, through lime, yellow, orange, up to pulsing red at 80%+. A health fill bar drains from top to bottom as dupes take damage, with a dark overlay making injuries immediately visible. Up to 3 alert badges can appear simultaneously on each portrait for critical states like suffocation, low health, scalding, hypothermia, starvation, radiation sickness, bladder emergencies, stuck dupes, idle dupes, and disease. Alerts are priority-ordered so the most dangerous condition always shows first.\n\nClick any widget to select that dupe and snap the camera to them. Hover for a detailed tooltip showing their current task, stress, health, breath, body temperature, calories, and bladder — all with green-to-red color gradients — plus any active alerts with color-coded animated text. The tooltip stays on-screen even when hovering dupes near the edges.\n\nPortraits are expression-driven — dupes change facial expressions based on their current alert or stress level, with periodic blinking. Overjoyed dupes get a rainbow-cycling border with sparkle effects. Displays dupe portraits by default, with a colored-initials mode available in mod settings for a lighter look or better readability in packed colonies. The bar wraps into multiple rows as your colony grows, with a scrollbar when rows exceed the configured limit. Drag the header to reposition anywhere on screen, or drag the resize grip to adjust portrait size on the fly.\n\n[h2]Features[/h2]\n[list]\n[*] [b]Expression-driven portraits[/b] — dupes show contextual facial expressions (suffocating, angry, cold, hot, hungry, sick, sparkle, etc.) with periodic blinking\n[*] [b]Stress-colored borders[/b] — 5-tier gradient from green (calm) to pulsing red (critical), with configurable thresholds\n[*] [b]Overjoyed rainbow border[/b] — animated rainbow cycling with sparkle effects and glow\n[*] [b]Health fill bar[/b] — vertical drain with green-to-red gradient and a dark damage overlay above the portrait\n[*] [b]Alert badges[/b] — suffocating, low HP, incapacitated, scalding, hypothermia, irradiated, starving, disease, bladder urgent, stuck, idle, overstressed; up to 3 shown simultaneously with priority ordering\n[*] [b]Animated tooltip[/b] — name, current task, stress, health, breath, body temperature, calories, bladder, and all active alerts with color-coded text; stat values use green-to-red gradients; overjoyed alerts get rainbow cycling\n[*] [b]Click to select[/b] — selects the dupe and snaps the camera to them\n[*] [b]Portraits or initials[/b] — full dupe portraits by default; switch to colored initials in mod settings\n[*] [b]Sort & Filter popup[/b] — click the Sort/Filter button to sort by stress, calories, name, or job role; filter to show only alerted or stressed dupes; filter by job role; or hide individual dupes by name\n[*] [b]Multi-row grid layout[/b] — wraps into rows automatically, with configurable max width and max rows\n[*] [b]Scroll overflow[/b] — thin scrollbar appears when dupes exceed visible rows\n[*] [b]Draggable & collapsible[/b] — drag the header to reposition; collapse to just the header bar; position saved across sessions\n[*] [b]Resize grip[/b] — drag the bottom-right corner to adjust portrait size (16–96px), persisted between sessions\n[*] [b]Configurable[/b] — portrait size, bar opacity, max width, max rows, display mode, expression toggle, stress thresholds, and individual alert toggles via PLib mod options\n[*] [b]Respects game UI scale[/b] — scales with the in-game UI Scale slider (Options → Graphics), updates live\n[*] [b]Mod API[/b] — other mods can register custom alerts, hook tooltips, and listen to events via DSBApi (see docs/api-guide.md)\n[/list]\n\n[h2]Localization[/h2]\nAll UI text is translated into Chinese, Korean, Russian, Japanese, German, Spanish, and French. Translations load automatically based on your game language setting.\n\n[h2]Compatibility[/h2]\nWorks with the base game and all DLCs (Spaced Out!, The Frosty Planet Pack). Display only — does not modify any game logic or save data.\n\n[h2]Thanks to Sgt_Imalas for pioneering portrait compositing with DuperyFixed.[/h2]\n\nIf you enjoy the mod, please consider leaving a rating.\n\nSource: https://github.com/shikyo13/ONIMods\n\nLike my mods? - https://buymeacoffee.com/zerotheabsolute"
staticID: "DuplicantStatusBar"
