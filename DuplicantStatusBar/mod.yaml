title: "Duplicant Status Bar"
description: "[h1]Duplicant Status Bar[/h1]\n\nA persistent bar at the top of your screen showing every duplicant on the current asteroid. Think RimWorld's colonist bar, but for ONI.\n\nVanilla gives you a global stress number in the corner and that's about it. No persistent per-dupe status, no way to spot who's about to have a breakdown without hunting through menus. This mod fixes that.\n\nEach dupe gets a widget with a stress-colored border that shifts through a 5-tier gradient: green at calm, through lime, yellow, orange, up to pulsing red at 80%+. Alert badges overlay for critical states, priority-ordered so the most urgent one always shows. Click any widget to snap the camera to that dupe. Hover for a tooltip with their current task, stress, health, breath, and body temp.\n\nDisplays dupe portraits by default, with a colored-initials mode available in the settings for a more lightweight look or better readability in large colonies.\n\n[b]Early alpha — expect bugs. Please report them in the comments.[/b]\n\n[h2]Features[/h2]\n[list]\n[*] [b]Stress-colored borders[/b] — 5-tier gradient from green (calm) to pulsing red (critical)\n[*] [b]Alert badges[/b] — suffocating, low HP, scalding, hypothermia, disease, overstressed, overjoyed; priority-ordered\n[*] [b]Hover tooltip[/b] — name, current task, stress/health/breath, temperature, active alerts\n[*] [b]Click to select[/b] — selects the dupe and snaps the camera to them\n[*] [b]Portraits or initials[/b] — full dupe portraits by default; switch to colored initials in mod settings\n[*] [b]Sorting[/b] — by stress level, alphabetical, or job role\n[*] [b]Draggable & collapsible[/b] — reposition the bar anywhere; minimizes to just the header; position saved across sessions\n[*] [b]Auto-shrink[/b] — widgets scale down automatically for large colonies\n[*] [b]Configurable[/b] — portrait size, opacity, stress thresholds, and alert toggles via PLib mod options\n[/list]\n\n[h2]Planned[/h2]\n[list]\n[*] 2-row wrapping for massive colonies\n[*] Scroll arrows\n[*] Bladder/stamina warnings\n[*] Idle detection\n[/list]\n\n[h2]Compatibility[/h2]\nWorks with the base game and all DLCs. Display only — does not modify game logic.\n\nSource code will go up under MIT once things stabilize."
staticID: "DuplicantStatusBar"
version: "2.1.0"
