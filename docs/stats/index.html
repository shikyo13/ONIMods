<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zero's Mods - Stats Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --text: #e0e0ea;
    --dim: #7a7a8a;
    --accent: #6c5ce7;
    --green: #00b894;
    --gold: #fdcb6e;
    --orange: #e17055;
    --blue: #74b9ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(108,92,231,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,92,231,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem;
  }

  header {
    text-align: center; margin-bottom: 3rem;
  }

  header h1 {
    font-size: 2.8rem; font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -1px;
  }

  header p {
    color: var(--dim); font-size: 1.1rem; margin-top: 0.5rem;
  }

  .links {
    display: flex; gap: 1rem; justify-content: center; margin-top: 1rem; flex-wrap: wrap;
  }

  .links a {
    color: var(--accent); text-decoration: none; font-size: 0.9rem;
    padding: 0.3rem 0.8rem; border: 1px solid var(--border); border-radius: 6px;
    transition: all 0.2s;
  }

  .links a:hover { background: var(--surface2); border-color: var(--accent); }

  .section-title {
    font-size: 1.4rem; font-weight: 700; margin: 2.5rem 0 1rem;
    display: flex; align-items: center; gap: 0.6rem;
  }

  .section-title .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }

  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1rem;
  }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.5rem;
    transition: border-color 0.2s, transform 0.2s;
  }

  .card:hover { border-color: var(--accent); transform: translateY(-2px); }

  .card-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 1rem;
  }

  .card-header h3 { font-size: 1.1rem; font-weight: 700; }

  .card-header .game-tag {
    font-size: 0.7rem; font-weight: 500; padding: 0.2rem 0.6rem;
    border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px;
  }

  .tag-oni { background: rgba(78,205,196,0.15); color: #4ecdc4; }
  .tag-zomboid { background: rgba(142,68,173,0.15); color: #8e44ad; }
  .tag-subnautica { background: rgba(247,220,111,0.15); color: #f7dc6f; }

  .stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem;
  }

  .stat {
    text-align: center; padding: 0.8rem 0.4rem;
    background: var(--surface2); border-radius: 8px;
  }

  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.4rem; font-weight: 700;
  }

  .stat-label {
    font-size: 0.7rem; color: var(--dim); text-transform: uppercase;
    letter-spacing: 0.5px; margin-top: 0.2rem;
  }

  .val-green { color: var(--green); }
  .val-gold { color: var(--gold); }
  .val-blue { color: var(--blue); }
  .val-orange { color: var(--orange); }

  .totals {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem;
    margin-bottom: 2rem;
  }

  .total-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.5rem; text-align: center;
  }

  .total-card .stat-value { font-size: 2rem; }
  .total-card .stat-label { font-size: 0.85rem; }

  #loading {
    text-align: center; padding: 4rem; color: var(--dim);
  }

  .spinner {
    width: 32px; height: 32px; margin: 0 auto 1rem;
    border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .updated {
    text-align: center; color: var(--dim); font-size: 0.8rem;
    margin-top: 2rem; padding: 1rem;
    font-family: 'JetBrains Mono', monospace;
  }

  footer {
    text-align: center; padding: 2rem; color: var(--dim); font-size: 0.8rem;
  }

  footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 600px) {
    header h1 { font-size: 1.8rem; }
    .totals { grid-template-columns: repeat(2, 1fr); }
    .stats-row { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="container">
  <header>
    <h1>Zero's Mods</h1>
    <p>Live stats dashboard</p>
    <div class="links">
      <a href="https://steamcommunity.com/id/ahunt/myworkshopfiles/">Steam Workshop</a>
      <a href="https://www.nexusmods.com/profile/Zer0TheAbs0lute/mods">Nexus Mods</a>
      <a href="https://github.com/shikyo13/ONIMods">GitHub</a>
      <a href="https://buymeacoffee.com/zerotheabsolute">Support</a>
    </div>
  </header>

  <div id="loading">
    <div class="spinner"></div>
    Fetching live stats...
  </div>

  <div id="content" style="display:none">
    <div class="totals" id="totals"></div>

    <div class="section-title">
      <span class="dot" style="background:var(--green)"></span> Steam Workshop
    </div>
    <div class="grid" id="workshop-grid"></div>

    <div class="section-title" style="margin-top:2rem">
      <span class="dot" style="background:var(--accent)"></span> GitHub
    </div>
    <div class="grid" id="github-grid"></div>

    <div class="updated" id="updated"></div>
  </div>
</div>

<footer>
  <a href="https://github.com/shikyo13/ONIMods">shikyo13/ONIMods</a> |
  <a href="https://buymeacoffee.com/zerotheabsolute">Buy Me a Coffee</a> |
  <a href="https://www.patreon.com/cw/ZeroTheAbsolute/membership">Patreon</a>
</footer>

<script>
const WORKSHOP_MODS = [
  { id: '3682732647', name: 'Duplicant Status Bar', game: 'ONI', tagClass: 'tag-oni' },
  { id: '3667874678', name: 'Barricade Context Menu', game: 'Zomboid', tagClass: 'tag-zomboid' },
  { id: '3402208866', name: 'Barricades Hurt Zombies', game: 'Zomboid', tagClass: 'tag-zomboid' },
];

const GITHUB_REPO = 'shikyo13/ONIMods';

// Steam API doesn't support CORS, so we use a proxy
// For production, use your own proxy or a serverless function
const STEAM_PROXY = 'https://api.allorigins.win/raw?url=';

async function fetchWorkshopStats() {
  const ids = WORKSHOP_MODS.map(m => m.id);
  const params = new URLSearchParams();
  params.set('itemcount', ids.length);
  ids.forEach((id, i) => params.set(`publishedfileids[${i}]`, id));

  const url = `https://api.steampowered.com/ISteamRemoteStorage/GetPublishedFileDetails/v1/`;
  try {
    const resp = await fetch(STEAM_PROXY + encodeURIComponent(url), {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: params.toString()
    });
    const data = await resp.json();
    return data.response.publishedfiledetails || [];
  } catch (e) {
    console.error('Steam fetch failed:', e);
    return [];
  }
}

async function fetchGitHubStats() {
  try {
    const resp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}`);
    return await resp.json();
  } catch (e) {
    console.error('GitHub fetch failed:', e);
    return null;
  }
}

function num(n) {
  return Number(n || 0).toLocaleString();
}

function renderCard(mod, details) {
  const subs = details.subscriptions || 0;
  const favs = details.favorited || 0;
  const views = details.views || 0;

  return `
    <div class="card">
      <div class="card-header">
        <h3>${mod.name}</h3>
        <span class="game-tag ${mod.tagClass}">${mod.game}</span>
      </div>
      <div class="stats-row">
        <div class="stat">
          <div class="stat-value val-green">${num(subs)}</div>
          <div class="stat-label">Subscribers</div>
        </div>
        <div class="stat">
          <div class="stat-value val-gold">${num(favs)}</div>
          <div class="stat-label">Favorites</div>
        </div>
        <div class="stat">
          <div class="stat-value val-blue">${num(views)}</div>
          <div class="stat-label">Views</div>
        </div>
      </div>
    </div>
  `;
}

async function init() {
  const [workshopDetails, ghData] = await Promise.all([
    fetchWorkshopStats(),
    fetchGitHubStats()
  ]);

  let totalSubs = 0, totalFavs = 0, totalViews = 0;
  const workshopGrid = document.getElementById('workshop-grid');

  WORKSHOP_MODS.forEach((mod, i) => {
    const details = workshopDetails[i] || {};
    totalSubs += Number(details.subscriptions || 0);
    totalFavs += Number(details.favorited || 0);
    totalViews += Number(details.views || 0);
    workshopGrid.innerHTML += renderCard(mod, details);
  });

  // Totals
  document.getElementById('totals').innerHTML = `
    <div class="total-card">
      <div class="stat-value val-green">${num(totalSubs)}</div>
      <div class="stat-label">Total Subscribers</div>
    </div>
    <div class="total-card">
      <div class="stat-value val-gold">${num(totalFavs)}</div>
      <div class="stat-label">Total Favorites</div>
    </div>
    <div class="total-card">
      <div class="stat-value val-blue">${num(totalViews)}</div>
      <div class="stat-label">Total Views</div>
    </div>
    <div class="total-card">
      <div class="stat-value val-orange">${num(ghData?.stargazers_count || 0)}</div>
      <div class="stat-label">GitHub Stars</div>
    </div>
  `;

  // GitHub
  if (ghData) {
    document.getElementById('github-grid').innerHTML = `
      <div class="card">
        <div class="card-header">
          <h3>${GITHUB_REPO}</h3>
          <span class="game-tag" style="background:rgba(116,185,255,0.15);color:#74b9ff">GitHub</span>
        </div>
        <div class="stats-row">
          <div class="stat">
            <div class="stat-value val-orange">${num(ghData.stargazers_count)}</div>
            <div class="stat-label">Stars</div>
          </div>
          <div class="stat">
            <div class="stat-value val-blue">${num(ghData.forks_count)}</div>
            <div class="stat-label">Forks</div>
          </div>
          <div class="stat">
            <div class="stat-value val-green">${num(ghData.open_issues_count)}</div>
            <div class="stat-label">Issues</div>
          </div>
        </div>
      </div>
    `;
  }

  document.getElementById('updated').textContent =
    `Last updated: ${new Date().toLocaleString()} (live fetch)`;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

init();
// Auto-refresh every 5 minutes
setInterval(init, 5 * 60 * 1000);
</script>
</body>
</html>
